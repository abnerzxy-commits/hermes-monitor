name: Hermès Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run API monitor (5 rounds, 1 min interval)
        continue-on-error: true
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Round $i/5 ==="
            python hermes_api_monitor.py || true
            if [ $i -lt 5 ]; then
              echo "Waiting 60s..."
              sleep 60
            fi
          done

      - name: Commit updated products
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/monitor.log data/restock_history.json data/known_product_urls.json data/wishlist.json || true
          git diff --cached --quiet || git commit -m "update products $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
